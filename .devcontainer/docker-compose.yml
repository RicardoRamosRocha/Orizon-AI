services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile

    volumes:
      - ..:/workspaces/Orizon-AI:cached

    command: sleep infinity

    environment:
      ASPNETCORE_ENVIRONMENT: Development

      ConnectionStrings__DefaultConnection: >-
        Host=postgres;
        Port=5432;
        Database=orizon_ai;
        Username=orizon_user;
        Password=orizon_dev_password

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - orizon-network

  postgres:
    image: postgres:16

    restart: unless-stopped

    environment:
      POSTGRES_DB: orizon_ai
      POSTGRES_USER: orizon_user
      POSTGRES_PASSWORD: orizon_dev_password

    volumes:
      - orizon-postgres-data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U orizon_user -d orizon_ai"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - orizon-network

volumes:
  orizon-postgres-data:

networks:
  orizon-network:
    driver: bridge